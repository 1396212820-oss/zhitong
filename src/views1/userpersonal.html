<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VISION ASSIST - 个人中心</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#454747",
                    "surface-variant": "#353535",
                    "on-secondary-container": "#ffb3a9",
                    "inverse-on-surface": "#303030",
                    "error-container": "#93000a",
                    "on-primary-fixed-variant": "#3037aa",
                    "tertiary": "#c6c6c7",
                    "surface-bright": "#393939",
                    "primary-fixed": "#e0e0ff",
                    "surface-container-lowest": "#0e0e0e",
                    "on-tertiary-fixed": "#1a1c1c",
                    "surface-container": "#1f1f1f",
                    "on-secondary-fixed": "#410001",
                    "surface-container-low": "#1b1b1b",
                    "surface": "#131313",
                    "outline-variant": "#454653",
                    "outline": "#908f9f",
                    "on-primary-container": "#7981f5",
                    "on-primary-fixed": "#00006e",
                    "background": "#131313",
                    "tertiary-container": "#242626",
                    "on-background": "#e2e2e2",
                    "surface-dim": "#131313",
                    "inverse-primary": "#4951c3",
                    "secondary-fixed": "#ffdad5",
                    "inverse-surface": "#e2e2e2",
                    "on-surface": "#e2e2e2",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "primary-fixed-dim": "#bfc2ff",
                    "secondary": "#ffb4a9",
                    "on-error-container": "#ffdad6",
                    "on-tertiary": "#2f3131",
                    "on-secondary": "#690002",
                    "tertiary-fixed": "#e2e2e2",
                    "primary-container": "#00008b",
                    "on-error": "#690005",
                    "surface-tint": "#bfc2ff",
                    "surface-container-high": "#2a2a2a",
                    "primary": "#bfc2ff",
                    "on-primary": "#141994",
                    "error": "#ffb4ab",
                    "secondary-container": "#a90206",
                    "on-tertiary-container": "#8b8d8d",
                    "secondary-fixed-dim": "#ffb4a9",
                    "surface-container-highest": "#353535",
                    "on-surface-variant": "#c6c5d5",
                    "on-secondary-fixed-variant": "#930004"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-page": "32px",
                    "touch-target-min": "64px",
                    "gutter": "24px",
                    "unit": "8px",
                    "stack-gap": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Lexend"],
                    "label-lg": ["Lexend"],
                    "button-text": ["Lexend"],
                    "body-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "headline-md": ["Lexend"]
            },
            "fontSize": {
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "button-text": ["26px", {"lineHeight": "32px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "body-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-lg": ["28px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
            font-size: 48px;
        }
        /* Custom range slider styling for brutalist look */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 48px;
            width: 24px;
            background: #ffffff;
            border: 4px solid #00008b;
            border-radius: 8px;
            cursor: pointer;
            margin-top: -16px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 16px;
            cursor: pointer;
            background: #00008b;
            border: 2px solid #ffffff;
            border-radius: 8px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-black text-white font-body-md overflow-x-hidden">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full border-b-4 border-white bg-black z-50 flex justify-between items-center px-6 h-20">
<h1 class="font-lexend font-black uppercase text-2xl tracking-tighter text-white font-bold" style="font-size: 24px;">智瞳</h1>
<div class="flex items-center"><span class="material-symbols-outlined text-white" data-icon="star" style="font-size: 32px;">star</span></div>
</header>
<main class="mt-20 mb-32 px-6 flex flex-col gap-stack-gap">
<!-- User Profile Header Section -->
<section class="flex items-center gap-6 py-6 border-b-4 border-white">
<div class="w-32 h-32 rounded-lg border-4 border-white overflow-hidden bg-blue-900 flex-shrink-0">
<div class="w-full h-full flex items-center justify-center bg-blue-900"><span class="material-symbols-outlined text-white" style="font-size: 80px;">person</span></div>
</div>
<div>
<h2 class="font-headline-md text-white">用户名称</h2>
<span class="bg-blue-900 text-white font-label-lg px-4 py-1 rounded border-2 border-white inline-block">已实名认证</span>
</div>
</section>
<!-- My Guardian Section (我的监护人) -->
<section class="border-4 border-white bg-surface-container rounded-lg p-6 flex flex-col gap-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-blue-700">health_and_safety</span>
<h3 class="font-headline-md">我的监护人</h3>
</div>
<div class="bg-black border-2 border-white rounded-lg p-4 space-y-2">
<p class="font-body-lg text-white">姓名: <span class="text-white">张小华</span></p>
<p class="font-body-lg text-white">电话: <span class="text-white">138 **** 5678</span></p>
</div>
</section>
<!-- Sliders Section -->
<section class="flex flex-col gap-6">
<div class="p-6 border-4 border-white rounded-lg bg-surface">
<div class="flex justify-between items-center mb-4">
<label class="font-button-text"><span class="text-4xl font-bold">音量调节</span></label>
<span class="material-symbols-outlined">volume_up</span>
</div>
<input class="h-12 cursor-pointer" max="100" min="0" type="range" value="80"/>
</div>
<div class="p-6 border-4 border-white rounded-lg bg-surface">
<div class="flex justify-between items-center mb-4">
<label class="font-button-text"><span class="text-4xl font-bold">亮度调节</span></label>
<span class="material-symbols-outlined">brightness_6</span>
</div>
<input class="h-12 cursor-pointer" max="100" min="0" type="range" value="70"/>
</div>
<div class="p-6 border-4 border-white rounded-lg bg-surface">
<div class="flex justify-between items-center mb-4">
<label class="font-button-text"><span class="text-4xl font-bold">语速调节</span></label>
<span class="material-symbols-outlined">record_voice_over</span>
</div>
<input class="h-12 cursor-pointer" max="100" min="0" type="range" value="50"/>
</div>
</section>
<!-- Grid Based Functional Buttons Section -->
<section class="grid grid-cols-2 gap-4"><button class="bg-black border-4 border-white rounded-xl h-40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">grid_view</span>
<span class="font-button-text text-white">切换模式</span>
</button>
<button class="bg-blue-900 border-4 border-white rounded-xl h-40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">settings</span>
<span class="font-button-text text-white">系统设置</span>
</button>
<button class="bg-black border-4 border-white rounded-xl h-40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">help</span>
<span class="font-button-text text-white">使用指南</span>
</button>
<button class="bg-black border-4 border-white rounded-xl h-40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">feedback</span>
<span class="font-button-text text-white">意见反馈</span>
</button>
<button class="bg-black border-4 border-white rounded-xl h-40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-error">logout</span>
<span class="font-button-text text-error">退出登录</span>
</button>
</section>
</main>
<!-- BottomNavBar Section -->
<nav class="fixed bottom-0 w-full border-t-4 border-white bg-black z-50 flex justify-around items-stretch h-28 w-full">
<a class="text-white flex flex-col items-center justify-center h-full hover:bg-zinc-900 transition-colors w-1/3" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-lexend font-bold text-lg uppercase">首页</span>
</a>
<a class="text-white flex flex-col items-center justify-center h-full hover:bg-zinc-900 transition-colors w-1/3 border-x-4 border-white" href="#">
<span class="material-symbols-outlined">visibility</span>
<span class="font-lexend font-bold text-lg uppercase">相机</span>
</a>
<a class="bg-blue-900 text-white flex flex-col items-center justify-center h-full w-1/3" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-lexend font-bold text-lg uppercase">个人</span>
</a>
</nav>
</body></html>
