<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#1b1b1b",
                    "on-primary-container": "#7981f5",
                    "on-primary": "#141994",
                    "surface-dim": "#131313",
                    "inverse-primary": "#4951c3",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-primary-fixed-variant": "#3037aa",
                    "inverse-on-surface": "#303030",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-tertiary-container": "#8b8d8d",
                    "secondary-fixed-dim": "#ffb4a9",
                    "primary": "#bfc2ff",
                    "outline": "#908f9f",
                    "tertiary": "#c6c6c7",
                    "primary-fixed-dim": "#bfc2ff",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-primary-fixed": "#00006e",
                    "inverse-surface": "#e2e2e2",
                    "on-secondary-container": "#ffb3a9",
                    "surface-bright": "#393939",
                    "error-container": "#93000a",
                    "on-secondary": "#690002",
                    "tertiary-fixed": "#e2e2e2",
                    "secondary-fixed": "#ffdad5",
                    "on-secondary-fixed": "#410001",
                    "background": "#131313",
                    "tertiary-container": "#242626",
                    "primary-fixed": "#e0e0ff",
                    "surface-container": "#1f1f1f",
                    "on-tertiary": "#2f3131",
                    "on-surface": "#e2e2e2",
                    "on-error": "#690005",
                    "secondary-container": "#a90206",
                    "outline-variant": "#454653",
                    "secondary": "#ffb4a9",
                    "on-secondary-fixed-variant": "#930004",
                    "on-background": "#e2e2e2",
                    "on-error-container": "#ffdad6",
                    "surface-container-high": "#2a2a2a",
                    "on-surface-variant": "#c6c5d5",
                    "surface": "#131313",
                    "surface-tint": "#bfc2ff",
                    "primary-container": "#00008b",
                    "surface-variant": "#353535",
                    "surface-container-lowest": "#0e0e0e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1.5rem",
                    "xl": "2rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "touch-target-min": "64px",
                    "stack-gap": "24px",
                    "margin-page": "32px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Lexend"],
                    "label-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "button-text": ["Lexend"],
                    "body-lg": ["Lexend"]
            },
            "fontSize": {
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "body-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "button-text": ["26px", {"lineHeight": "32px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "body-lg": ["28px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
            font-size: 48px;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black text-on-background font-body-md overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full border-b-4 border-white bg-black flex justify-between items-center px-6 h-24 z-50"><div class="flex items-center">
<h1 class="font-lexend font-black uppercase text-2xl tracking-tighter text-white">智瞳</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-white" data-icon="star">star</span>
</div></header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col mt-24 mb-28">
<!-- Camera Preview Area (70%) - Now a clean solid dark background -->
<section class="relative h-[70%] w-full bg-surface-container-lowest overflow-hidden flex items-center justify-center"><div class="relative w-[85%] h-[75%] border-8 border-white rounded-[50%] flex items-center justify-center overflow-hidden" style="background-color: #0052CC; background-image: radial-gradient(circle, #ffffff20 1px, transparent 1px); background-size: 40px 40px;">
<span class="text-white font-black text-8xl z-10 drop-shadow-2xl">点击</span>
</div></section>
<!-- Operation Area (30%) - Redesigned 2x2 Grid -->
<section class="h-[30%] w-full grid grid-cols-2 gap-4 p-4 border-t-4 border-white bg-black items-stretch"><!-- Click to Start Photo -->
<!-- Voice Input -->
<button class="bg-surface-container-highest hover:bg-zinc-800 active:scale-95 transition-all flex flex-col items-center justify-center gap-2 rounded-xl border-4 border-white">
<span class="material-symbols-outlined text-white scale-125" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="text-white font-bold text-xl">语音输入</span>
</button>
<!-- Mode Switch -->
<button class="bg-surface-container-highest hover:bg-zinc-800 active:scale-95 transition-all flex flex-col items-center justify-center gap-2 rounded-xl border-4 border-white">
<span class="material-symbols-outlined text-white scale-125" data-icon="sync_alt">sync_alt</span>
<span class="text-white font-bold text-xl">功能切换</span>
</button></section>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full border-t-4 border-white bg-black flex justify-around items-stretch h-28 z-50">
<a class="text-white flex flex-col items-center justify-center h-full flex-grow hover:bg-zinc-900 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-lexend font-bold text-lg uppercase mt-1">主页</span>
</a>
<a class="bg-[#0052CC] text-white flex flex-col items-center justify-center h-full flex-grow border-x-4 border-white active:bg-blue-800 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-lexend font-bold text-lg uppercase mt-1">相机</span>
</a>
<a class="text-white flex flex-col items-center justify-center h-full flex-grow hover:bg-zinc-900 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-lexend font-bold text-lg uppercase mt-1">个人</span>
</a>
</nav>
</body></html>
