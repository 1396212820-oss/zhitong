<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#1f1f1f",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-dim": "#131313",
                    "surface-tint": "#bfc2ff",
                    "on-primary-fixed": "#00006e",
                    "on-primary-container": "#7981f5",
                    "surface-container-highest": "#353535",
                    "primary-fixed": "#e0e0ff",
                    "secondary-fixed": "#ffdad5",
                    "surface": "#131313",
                    "surface-container-low": "#1b1b1b",
                    "inverse-surface": "#e2e2e2",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "tertiary-fixed": "#e2e2e2",
                    "error-container": "#93000a",
                    "on-surface-variant": "#c6c5d5",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e2e2e2",
                    "surface-variant": "#353535",
                    "secondary-fixed-dim": "#ffb4a9",
                    "background": "#131313",
                    "secondary": "#ffb4a9",
                    "on-background": "#e2e2e2",
                    "on-secondary-fixed": "#410001",
                    "on-primary": "#141994",
                    "tertiary-container": "#242626",
                    "secondary-container": "#a90206",
                    "tertiary": "#c6c6c7",
                    "on-secondary-fixed-variant": "#930004",
                    "on-tertiary-container": "#8b8d8d",
                    "primary": "#bfc2ff",
                    "on-tertiary": "#2f3131",
                    "inverse-on-surface": "#303030",
                    "primary-fixed-dim": "#bfc2ff",
                    "on-secondary": "#690002",
                    "surface-container-high": "#2a2a2a",
                    "primary-container": "#00008b",
                    "outline-variant": "#454653",
                    "surface-bright": "#393939",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "on-secondary-container": "#ffb3a9",
                    "inverse-primary": "#4951c3",
                    "on-primary-fixed-variant": "#3037aa",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-tertiary-fixed-variant": "#454747",
                    "outline": "#908f9f",
                    "brand-blue": "#0052CC"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1.5rem",
                    "xl": "2rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "24px",
                    "unit": "8px",
                    "margin-page": "32px",
                    "touch-target-min": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "button-text": ["Lexend"],
                    "headline-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "label-lg": ["Lexend"]
            },
            "fontSize": {
                    "button-text": ["26px", {"lineHeight": "32px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["28px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
            font-size: 120px;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-[#0052CC] text-white font-lexend selection:bg-white selection:text-[#0052CC] overflow-hidden">
<main class="flex flex-col items-center justify-between min-h-screen p-8 text-center">
<!-- Top Status Branding -->
<div class="w-full pt-4">
<span class="inline-block px-6 py-3 bg-black text-white border-4 border-white font-label-lg text-label-lg uppercase tracking-widest rounded-xl">
            紧急状态
        </span>
</div>
<!-- Central Warning Cluster -->
<div class="flex flex-col items-center gap-10">
<!-- Massive Icon with Thick White Border -->
<div class="w-48 h-48 rounded-full border-[12px] border-white flex items-center justify-center animate-pulse bg-white/10">
<span class="material-symbols-outlined text-white" style="font-size: 120px;">priority_high</span>
</div>
<!-- Urgent Message -->
<div class="space-y-6 max-w-lg">
<h1 class="font-headline-lg text-headline-lg text-white leading-none drop-shadow-lg">
                检测到摔倒！
            </h1>
<div class="font-body-lg text-body-lg text-black bg-white px-6 py-3 border-l-[12px] border-black rounded-r-xl shadow-xl">
                正在向监护人发送位置
            </div>
</div>
</div>
<!-- Map Location Context (Rounded Brutalist Card) -->
<div class="w-full max-w-md border-4 border-black bg-white p-4 flex items-center gap-4 rounded-2xl shadow-2xl">
<div class="w-24 h-24 bg-zinc-200 border-2 border-black flex-shrink-0 rounded-lg overflow-hidden flex items-center justify-center bg-white">
<span class="material-symbols-outlined text-black flex items-center justify-center w-full h-full fill-icon" style="font-size: 48px;">location_on</span>
</div>
<div class="text-left">
<span class="block font-label-lg text-label-lg text-zinc-500 uppercase">当前位置</span>
<span class="block font-body-md text-body-md text-black">****</span>
</div>
</div>
<!-- Footer Action (Full Width Rounded Button) -->
<div class="w-full space-y-6">
<button class="w-full h-32 bg-white border-4 border-black border-b-[12px] active:border-b-4 active:translate-y-2 transition-all flex items-center justify-center gap-4 group rounded-2xl">
<span class="material-symbols-outlined text-[#0052CC] !text-5xl" style="font-variation-settings: 'FILL' 1;">cancel</span>
<span class="font-button-text text-button-text text-[#0052CC]">我没事，取消告警</span>
</button>
<p class="font-label-lg text-label-lg text-white font-bold">
            自动确认将在 10 秒后执行
        </p>
</div>
</main>
</body></html>
