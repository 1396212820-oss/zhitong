<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#1f1f1f",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-dim": "#131313",
                    "surface-tint": "#bfc2ff",
                    "on-primary-fixed": "#00006e",
                    "on-primary-container": "#7981f5",
                    "surface-container-highest": "#353535",
                    "primary-fixed": "#e0e0ff",
                    "secondary-fixed": "#ffdad5",
                    "surface": "#131313",
                    "surface-container-low": "#1b1b1b",
                    "inverse-surface": "#e2e2e2",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "tertiary-fixed": "#e2e2e2",
                    "error-container": "#93000a",
                    "on-surface-variant": "#c6c5d5",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e2e2e2",
                    "surface-variant": "#353535",
                    "secondary-fixed-dim": "#ffb4a9",
                    "background": "#131313",
                    "secondary": "#ffb4a9",
                    "on-background": "#e2e2e2",
                    "on-secondary-fixed": "#410001",
                    "on-primary": "#141994",
                    "tertiary-container": "#242626",
                    "secondary-container": "#a90206",
                    "tertiary": "#c6c6c7",
                    "on-secondary-fixed-variant": "#930004",
                    "on-tertiary-container": "#8b8d8d",
                    "primary": "#bfc2ff",
                    "on-tertiary": "#2f3131",
                    "inverse-on-surface": "#303030",
                    "primary-fixed-dim": "#bfc2ff",
                    "on-secondary": "#690002",
                    "surface-container-high": "#2a2a2a",
                    "primary-container": "#00008b",
                    "outline-variant": "#454653",
                    "surface-bright": "#393939",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "on-secondary-container": "#ffb3a9",
                    "inverse-primary": "#4951c3",
                    "on-primary-fixed-variant": "#3037aa",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-tertiary-fixed-variant": "#454747",
                    "outline": "#908f9f",
                    "brand-blue": "#0052CC"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "24px",
                    "unit": "8px",
                    "margin-page": "32px",
                    "touch-target-min": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "button-text": ["Lexend"],
                    "headline-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "label-lg": ["Lexend"]
            },
            "fontSize": {
                    "button-text": ["26px", {"lineHeight": "32px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["28px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
            font-size: 80px;
        }
        .emergency-icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black text-on-background font-body-md antialiased overflow-hidden">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full border-b-4 border-white bg-black z-50 flex justify-between items-center px-6 h-24">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white active:scale-95 transition-transform" data-icon="close">close</span>
</div>
</header>
<!-- Main Content: Focused Emergency Interface -->
<main class="h-screen w-full pt-24 pb-0 flex flex-col px-8 gap-8 overflow-hidden">
<!-- Emergency Action 1: Contacts -->
<section class="flex-1 mt-8">
<button class="w-full h-full bg-secondary-container border-4 border-white rounded-2xl flex flex-col items-center justify-center gap-6 active:scale-95 transition-transform">
<div class="p-8">
<span class="material-symbols-outlined text-white text-9xl" data-icon="call">call</span>
</div>
<span class="font-headline-lg text-white text-center px-4">呼叫紧急联系人</span>
</button>
</section>
<!-- Emergency Action 2: Police -->
<section class="flex-1 mb-12">
<button class="w-full h-full bg-brand-blue border-4 border-white rounded-2xl flex flex-col items-center justify-center gap-6 active:scale-95 transition-transform">
<div class="p-8">
<span class="material-symbols-outlined text-white text-9xl" data-icon="local_police">local_police</span>
</div>
<span class="font-headline-lg text-white text-center px-4">一键报警 110</span>
</button>
</section>
</main>
<!-- Status Overlay/Contextual Info -->
<div class="fixed bottom-4 left-0 w-full px-8 pointer-events-none">
<div class="bg-black border-4 border-white p-4 text-center rounded-xl">
<p class="text-white font-label-lg uppercase">当前位置: 北京市朝阳区建国路</p>
</div>
</div>
</body></html>
