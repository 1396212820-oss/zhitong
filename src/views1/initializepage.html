<!DOCTYPE html><html class="dark" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#1f1f1f",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-dim": "#131313",
                    "surface-tint": "#bfc2ff",
                    "on-primary-fixed": "#00006e",
                    "on-primary-container": "#7981f5",
                    "surface-container-highest": "#353535",
                    "primary-fixed": "#e0e0ff",
                    "secondary-fixed": "#ffdad5",
                    "surface": "#131313",
                    "surface-container-low": "#1b1b1b",
                    "inverse-surface": "#e2e2e2",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "tertiary-fixed": "#e2e2e2",
                    "error-container": "#93000a",
                    "on-surface-variant": "#c6c5d5",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e2e2e2",
                    "surface-variant": "#353535",
                    "secondary-fixed-dim": "#ffb4a9",
                    "background": "#131313",
                    "secondary": "#ffb4a9",
                    "on-background": "#e2e2e2",
                    "on-secondary-fixed": "#410001",
                    "on-primary": "#141994",
                    "tertiary-container": "#242626",
                    "secondary-container": "#a90206",
                    "tertiary": "#c6c6c7",
                    "on-secondary-fixed-variant": "#930004",
                    "on-tertiary-container": "#8b8d8d",
                    "primary": "#bfc2ff",
                    "on-tertiary": "#2f3131",
                    "inverse-on-surface": "#303030",
                    "primary-fixed-dim": "#bfc2ff",
                    "on-secondary": "#690002",
                    "surface-container-high": "#2a2a2a",
                    "primary-container": "#00008b",
                    "outline-variant": "#454653",
                    "surface-bright": "#393939",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "on-secondary-container": "#ffb3a9",
                    "inverse-primary": "#4951c3",
                    "on-primary-fixed-variant": "#3037aa",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-tertiary-fixed-variant": "#454747",
                    "outline": "#908f9f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "24px",
                    "unit": "8px",
                    "margin-page": "32px",
                    "touch-target-min": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "button-text": ["Lexend"],
                    "headline-md": ["Lexend"],
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "label-lg": ["Lexend"]
            },
            "fontSize": {
                    "button-text": ["26px", {"lineHeight": "32px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["28px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
            font-size: 84px;
        }
        body {
            background-color: #FFFFFF;
            color: #000000;
            overflow: hidden;
        }
        .brutal-border {
            border: 4px solid #000000;
        }
        .deep-blue-btn {
            background-color: #0052CC; /* Specific requested deep blue style */
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-0 m-0 font-lexend">
<!-- Top Navigation -->
<header class="w-full h-24 bg-black flex justify-between items-center px-6 border-b-4 border-white fixed top-0 z-50">
<div class="flex items-center">
<h1 class="text-white font-lexend font-bold text-[24px] uppercase tracking-tighter">智瞳</h1>
</div>
<span class="material-symbols-outlined text-white" data-icon="star" style="font-size: 32px;">star</span>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full px-margin-page gap-stack-gap mt-24 mb-28 bg-white">
<!-- Instruction Text -->
<h2 class="font-headline-lg text-black text-center mb-8 px-4"><br></h2>
<!-- Massive Interactive Button (Main action is already circular, but maintained within the high-contrast theme) -->
<button class="w-[300px] h-[300px] rounded-full deep-blue-btn flex items-center justify-center brutal-border active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="touch_app" style="font-size: 140px; font-variation-settings: &quot;FILL&quot; 1;">touch_app</span>
</button>
<!-- Contextual Visual Aid -->
</main>
<!-- Footer Feedback Area (Updated to have rounded corners as requested for "rectangular buttons/areas") -->
<footer class="w-[calc(100%-32px)] h-32 bg-zinc-400 border-4 border-zinc-600 rounded-xl flex items-center justify-center fixed bottom-4 left-4 mb-4">
<p class="font-headline-md text-white tracking-widest text-center">
            震动反馈教学区
        </p>
</footer>


</body></html>
