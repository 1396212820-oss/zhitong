<body class="bg-black text-white font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b-4 border-white bg-black text-white flex justify-between items-center px-6 h-24 z-50 flex items-center px-6 justify-between">

</div>

</header>
<main class="pt-32 pb-36 px-6 max-w-4xl mx-auto flex flex-col gap-stack-gap">

<div class="w-full bg-deep-blue border-4 border-white rounded-xl p-8 flex items-center justify-between">

</button>
<button class="flex flex-col items-center justify-center gap-4 py-12 px-4 bg-black border-4 border-white rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="directions_bus">directions_bus</span>
<span class="font-button-text text-[22px] leading-tight text-white text-center">公交模式</span>
</button>
<!-- Row 2 -->
<button class="flex flex-col items-center justify-center gap-4 py-12 px-4 bg-black border-4 border-white rounded-xl active:scale-95 transition-transform">

<span class="font-button-text text-[22px] leading-tight text-white text-center">文字朗读</span>
</button>
<!-- Row 3 -->
<!-- Row 4 -->
<button class="flex flex-col items-center justify-center gap-4 py-12 px-4 bg-black border-4 border-white rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="settings">settings</span>
<span class="font-button-text text-[22px] leading-tight text-white text-center">个性设置</span>
</button>
<!-- Row 5 (Spanning 2 columns for symmetry or keeping it 9-grid style) -->
</div>
<!-- Featured Map Section -->
<div class="mt-8 border-4 border-white p-6 bg-black rounded-xl flex flex-col gap-8 items-center">
<div class="w-full flex flex-col gap-4">
<div class="bg-deep-blue text-white p-4 font-label-lg border-2 border-white rounded-lg inline-block w-fit uppercase">周边服务</div>

<p class="text-body-md text-on-surface-variant">为您自动规划无障碍路径</p>
<button class="w-full h-20 bg-white text-black font-button-text border-4 border-white rounded-xl active:bg-zinc-300 transition-colors">

                </button>
</div>
</div>
</main>

<nav class="fixed bottom-0 w-full border-t-4 border-white bg-black flex justify-around items-stretch h-28 z-50">

<span class="material-symbols-outlined" data-icon="home">home</span>
